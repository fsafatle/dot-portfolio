name: Resumo Semanal DOT Portfolio (Slack)

on:
  schedule:
    # Toda segunda-feira às 11:00 UTC = 08:00 BRT
    - cron: "0 11 * * 1"
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar email
        env:
          GLOBAL_DATABASE_URL: ${{ secrets.GLOBAL_DATABASE_URL }}
          BRAZIL_DATABASE_URL: ${{ secrets.BRAZIL_DATABASE_URL }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/send_weekly_email.py
