name: Atualizar Snapshots Diários

# ──────────────────────────────────────────────────────────────────
# Atualiza preços e snapshots ~30min antes do envio ao Slack.
# Dispara 16:47 BRT (19:47 UTC). Minuto off-peak (:47) reduz atraso
# do GH Actions free-tier. Alvo de chegada: ~18h BRT.
# ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "47 19 * * 1-5"
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo  # garante que date.today() use horario de Brasilia

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Atualizar snapshots
        env:
          GLOBAL_DATABASE_URL: ${{ secrets.GLOBAL_DATABASE_URL }}
          BRAZIL_DATABASE_URL: ${{ secrets.BRAZIL_DATABASE_URL }}
        run: python scripts/refresh_snapshots.py
